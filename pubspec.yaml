name: zirofit_fl
description: "Ziro Fit - Fitness business management platform for personal trainers and clients."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.0
  cookie_jar: ^4.0.8

  # Local Database
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Auth
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.6

  # Connectivity
  connectivity_plus: ^6.1.4

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  image_picker: ^1.1.2
  intl: ^0.20.2

  # HTTP (used for Nominatim geocoding in onboarding)
  http: ^1.2.0

  # Utilities
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  shared_preferences: ^2.3.5
  uuid: ^4.5.1

  # Calendar Integration
  device_calendar: ^4.3.3

  # Permissions
  permission_handler: ^11.3.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^4.0.0

  # Text-to-Speech
  flutter_tts: ^4.2.3

  # Audio playback for ElevenLabs TTS streaming
  audioplayers: ^6.4.0

  # Deep Linking
  app_links: ^6.3.2

  # Speech-to-Text
  speech_to_text: ^7.0.0

  # Firebase / Push Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  timezone: any
  qr_flutter: ^4.1.0
  qr: ^3.0.2
  mobile_scanner: ^7.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Testing
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.25.2

  # Linting
  flutter_lints: ^6.0.0

  fake_async: any
  speech_to_text_platform_interface: any
flutter:
  uses-material-design: true
